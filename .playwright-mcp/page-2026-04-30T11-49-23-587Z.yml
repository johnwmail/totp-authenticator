                      - heading "林逸華律師行涉「撞車碰瓷黨」案 律師會介入" [level=3] [ref=e149]:
                        - link "林逸華律師行涉「撞車碰瓷黨」案 律師會介入" [ref=e150] [cursor=pointer]:
                          - /url: https://hk.news.yahoo.com/%E6%9E%97%E9%80%B8%E8%8F%AF%E5%BE%8B%E5%B8%AB%E8%A1%8C%E6%B6%89%E3%80%8C%E6%92%9E%E8%BB%8A%E7%A2%B0%E7%93%B7%E9%BB%A8%E3%80%8D%E6%A1%88-%E5%BE%8B%E5%B8%AB%E6%9C%83%E6%8C%87%E6%87%B7%E7%96%91%E6%B6%89%E4%B8%8D%E8%AA%A0%E5%AF%A6%E8%A1%8C%E7%82%BA-%E6%B1%BA%E5%AE%9A%E4%BB%8B%E5%85%A5%E6%A5%AD%E5%8B%99-020918918.html
                      - paragraph [ref=e152]: 林逸華律師行捲入以交通意外敲詐賠償的「撞車碰瓷黨」，並就警方搜證提出司法覆核。律師會周三（29 日）確認已委任羅拔臣律師事務所為中介人，同日執行介入行動。律師會又指，經調查後有初步證據顯示，有理由懷疑該律師行涉及不誠實行為。
