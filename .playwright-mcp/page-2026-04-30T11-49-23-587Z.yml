                      - paragraph [ref=e323]: 【Now新聞台】粉嶺繞道東段周日通車，聯和墟一帶的居民日後出九龍市區，可以避開粉嶺區內擠塞路段，比現時快大約10分鐘。粉嶺繞道東段是北部都會區首個落成的大型運輸基建，連接現有的粉嶺公路以及粉嶺北新發展區，經過塘坑、龍躍頭，再沿梧桐河畔伸延至石湖新村，全長約4公里。星期日通車之後，龍躍頭、聯和墟一帶的居民出市區就會更方便。土木工程拓展署總工程師張柏堅：「龍躍頭其實都有很多現有鄉村，以及聯和墟有很多居民。他利用繞道的話，由家出發前往九龍就會節省10分鐘，因為舊路他要經過馬會路、沙頭角公路，這段龍躍頭段其實有很多燈位，繁忙時間交通都非常大，所以我們這條粉嶺繞道不止便利到粉嶺北新發展區一些新發展，亦是連繫城鄉的。」繞道途經龍躍頭交匯處，當中有一個全球首例、採用S960國產超高強度鋼材建造的環形行人天橋新地標，強度是一般鋼材的三倍，令到橋身設計更纖巧。土木工程拓展署高級工程師梁偉樂：「纖巧的橋樑有一件事我們要注意，就是當有人在上面走動或跑步時，會否產生一些震動，從而令到行人覺得為何這條橋會動、有點害怕，是不可以這樣的。所以我們今次跟從國際標準，做了一次橋樑動態測試，有很大群人在上面走路，看看橋的
