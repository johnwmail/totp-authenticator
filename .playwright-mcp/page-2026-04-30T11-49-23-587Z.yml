                      - heading "台北車站男子性侵香港女遊客 判囚5年2個月" [level=3] [ref=e180]:
                        - link "台北車站男子性侵香港女遊客 判囚5年2個月" [ref=e181] [cursor=pointer]:
                          - /url: https://hk.news.yahoo.com/%E5%8F%B0%E5%8C%97%E8%BB%8A%E7%AB%99%E7%94%B7%E5%AD%90%E6%80%A7%E4%BE%B5%E9%A6%99%E6%B8%AF%E5%A5%B3%E9%81%8A%E5%AE%A2-%E5%88%A4%E5%9B%9A5%E5%B9%B42%E5%80%8B%E6%9C%88-051325685.html
                      - paragraph [ref=e183]: 台北車站男子性侵香港女遊客被判監禁5年2個月。 事發在去年10月，44歲被告邱勝明在台北車站大廳，性侵一名醉酒的71歲香港女遊客。警方其後接獲一名外國旅客報案，將他拘捕，被控趁機性交等罪名。台灣傳媒報道，他被捕後一度認罪，但之後又推翻供詞。控方認為他態度惡劣，因此求刑7年。而被告之前因偷竊被判囚6個月，但因未有服刑，也沒繳納罰款代替，而成為通緝犯。台北地方法院早上一審判處他監禁5年2個月，可上訴。
                  - listitem [ref=e185]:
                    - generic [ref=e186]:
                      - heading "城門河驚現「脹卜卜」五爪金龍 惹鱷魚驚魂" [level=3] [ref=e188]:
                        - link "城門河驚現「脹卜卜」五爪金龍 惹鱷魚驚魂" [ref=e189] [cursor=pointer]:
                          - /url: https://hk.news.yahoo.com/%E5%9F%8E%E9%96%80%E6%B2%B3%E9%A9%9A%E7%8F%BE%E3%80%8C%E8%84%B9%E5%8D%9C%E5%8D%9C%E3%80%8D%E4%BA%94%E7%88%AA%E9%87%91%E9%BE%8D-%E6%83%B9%E9%B1%B7%E9%AD%9A%E9%A9%9A%E9%AD%82-154815147.html
                      - paragraph [ref=e191]: 東網接獲讀者報料，指今晨(29日)11時許，在沙田城門河近香港文化博物館對開行人天橋位置對開，發現一條巨蜥在河中暢泳，疑為五爪金龍，其體形豐滿、腹肚脹起、約5呎長、深啡色，在河中游弋，期間不時伸出長舌，四處張望，似正在覓食，往大圍方向游去，最後不知所終。期間不少巿民用手機拍下，亦有人擔心巨蜥為鱷魚，致電政府服務的1823熱線，通知漁護署跟進。
