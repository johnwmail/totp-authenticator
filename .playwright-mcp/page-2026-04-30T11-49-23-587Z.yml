                      - generic "電子煙「牛肉乾」｜控煙酒辦：公眾地方吸食或管有罰3000元 不會警告即時票控" [ref=f18e5]
                      - generic:
                        - generic: 電子煙「牛肉乾」｜控煙酒辦：公眾地方吸食或管有罰3000元 不會警告即時票控
                        - generic: "【Now新聞台】即日起，任何人士不得在公眾地方管有及吸食電子煙或加熱煙，違者會被票控三千元。控煙酒辦早上在金鐘執法，發出兩張定額罰款通知書。 記者：「小姐你好，知不知道今天有控煙新例？」 她在我們提醒下藏起，不過他又沒這麼幸運，新法例生效首日，就因為吸食加熱煙當場被逮，被控煙酒辦人員票控。 新例下，任何人士不得在公眾地方管有另類吸煙產品，包括電子煙煙彈、煙油、加熱煙支及草本煙，違者會被定額罰款三千元，若超過5個煙彈、100支加熱煙支等，最高更可被判罰款五萬元及監禁六個月。 林先生：「有吸食電子煙的，可能(措施)會打擊他們吸煙意欲，但對我吸食傳統煙的沒有甚麼影響。你不應該罰管有那些人，應該罰買賣那些人。在家中吸食沒有人知，警察上門就沒有辦法，正常情況下不會知道他管有。」 記者：「朋友說不會帶出門？」 林先生：「他們說吸食完持有的就棄置。」 黃先生：「有吸食的(朋友)可能會不吸食。」 記者：「多不多？」 黃先生：「都多，因為怕罰錢。3000元香港人而言中位數，不算多，不算少。」 控煙酒辦早上在金鐘一帶天橋巡查及宣傳新法例。 衞生署控煙酒辦公室主任林民聰：「如果發現有人攜帶，這些另類吸煙產品會即時票控，不會有警告。執法時如可以拆開，我們檢取煙支及煙油，但若果是一體式的煙機，是拆不開的，我們會一併檢取。有時也會視乎情況，有需要的話亦可能會檢取煙機作證物或進一步化驗。」 別以為在室內吸食就無問題，控煙酒辦指大廈內共用的地方，例如後樓梯、大堂及走廊等都屬於公眾地方，同樣會執法。 控煙酒辦又稱，若在禁煙區吸食電子煙，是同時違反兩項法例，會被票控各3000元，合共定額罰款6000元。 #要聞"
