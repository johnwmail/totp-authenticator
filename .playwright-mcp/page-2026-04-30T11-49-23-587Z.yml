                      - paragraph [ref=e294]: 大埔宏福苑居民繼續分批返家執拾物品，當局昨日續安排宏道閣及宏昌閣居民上樓。有租住宏道閣單位的居民反映，政府安排的4個上樓名額中，業主佔用其中3個，只容許簽訂租約的兒子一人上樓，她只能留在樓下等候。年近70歲、租住宏道閣單位的何女士表示，業主只准許兒子一人上樓，但對方並非居於單位，直言「自己先知自己啲嘢放邊」。她透露，單位內只有洗衣機及冷氣機屬於業主，「屋內全部嘢都係我嘅」。何女士又指，曾嘗試與業主溝通，提出與兒子一同上樓，她可以不入屋、只在走廊即時決定帶走哪些財物亦可，但未獲接納。她亦曾就上樓名額問題向社工及區議員求助，惟未能成功爭取。她引述政務司副司長卓永興曾表示會給予租客酌情處理，質疑「唔明白點解政府唔可以幫我哋」。
