                      - paragraph [ref=e160]: 美國總統川普今天表示，他認為美國國家航空暨太空總署（NASA）有「很大機會」在他卸任前再度將太空人送上月球。川普（Donald Trump）是在白宮橢圓形辦公室接見最近完成NASA阿提米絲2號（Artemis 2）繞月任務的4名太空人時，做出上述表示。
