                      - paragraph [ref=e168]: 香港影壇巨星古天樂近日深陷密婚生子傳聞。儘管他曾以「其他一律雜音，我都不會回應」冷處理，但廣大網民並未收手，近日更鎖定一名千禧年代曾活躍於影壇的女演員林淑茵（Gloria Lam），認為她就是古天樂藏了十多年的神祕另一半。
