                      - paragraph [ref=e176]: 壁屋懲教所 18 歲還押者懷疑被人用木棍捅肛門致造成永久傷害，須用人工造口。二級懲教助理和一羈留人士認罪；一級助理及另 3 在囚者不認罪，案件周三（29 日）在區院展開第三日審訊。
                  - listitem [ref=e177]:
