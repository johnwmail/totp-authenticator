                        - link "葵涌私家車超速 74歲婦代親人「頂包」被捕" [ref=e142] [cursor=pointer]:
                          - /url: https://hk.news.yahoo.com/%E8%91%B5%E6%B6%8C%E7%A7%81%E5%AE%B6%E8%BB%8A%E8%B6%85%E9%80%9F%E9%A7%95%E9%A7%9B-74%E6%AD%B2%E8%80%81%E5%A9%A6%E4%BB%A3%E8%A6%AA%E4%BA%BA-%E9%A0%82%E5%8C%85-%E8%A2%AB%E6%8D%95-084848854.html
                      - paragraph [ref=e144]: 警方3月接獲報案，指一名女子涉嫌為親人的超速駕駛行為代為頂罪。中央交通攝影機違例調查組經深入調查後，今日（29日）拘捕一名74歲姓黃本地女子，涉妨礙司法公正。案情透露，2025年1月6日，一輛私家車在葵涌道被偵速攝影機偵測到超速行駛，案件交由中央交通攝影機違例調查組跟進。警員向涉案私家車車主發出「要求提交司機身份詳情通知書」，該名車主其後向警方稱一名姓黃女子為涉案司機，而該名姓黃女子亦向警方承認是當時違例司機。
