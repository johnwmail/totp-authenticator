name: CI

on:
  push:
    branches: [ main ]
    tags: [ "v*" ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  test:
    name: Run Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

  e2e:
    name: Run E2E Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium webkit

      - name: Run E2E tests
        run: npx playwright test

      - name: Upload test artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/

  deploy-preview:
    name: Deploy Preview
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch'
    needs: [test, e2e]
    permissions:
      contents: read
      deployments: write
    steps:
      - uses: actions/checkout@v4

      - name: Inject version into HTML
        run: |
          VERSION="preview-${GITHUB_SHA::7}"
          sed -i "s/vDev/${VERSION}/g" index.html
          echo "Version: ${VERSION}"

      - name: Create Pages project if needed
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages project create totp --production-branch=main
        continue-on-error: true

      - name: Deploy preview to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy . --project-name=totp --branch=preview --commit-dirty=true

  deploy-production:
    name: Deploy Production
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [test, e2e]
    permissions:
      contents: write
      deployments: write
    steps:
      - uses: actions/checkout@v4

      - name: Inject version into HTML
        run: |
          VERSION="${GITHUB_REF_NAME}"
          sed -i "s/vDev/${VERSION}/g" index.html
          echo "Version: ${VERSION}"

      - name: Create Pages project if needed
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages project create totp --production-branch=main
        continue-on-error: true

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy . --project-name=totp --branch=main --commit-dirty=true

      - name: Create release archives (zip/tar.gz)
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          # Create a single tar archive from HEAD
          git archive --format=tar --output=totp-authenticator-${GITHUB_REF_NAME}.tar HEAD

          # Unpack, replace index.html, and create both zip and tar.gz
          TMPDIR=$(mktemp -d)
          tar -xf totp-authenticator-${GITHUB_REF_NAME}.tar -C "$TMPDIR"
          cp "$GITHUB_WORKSPACE/index.html" "$TMPDIR/index.html"
          cd "$TMPDIR"
          zip -r "$GITHUB_WORKSPACE/totp-authenticator-${GITHUB_REF_NAME}.zip" .
          tar -czf "$GITHUB_WORKSPACE/totp-authenticator-${GITHUB_REF_NAME}.tar.gz" .
          cd "$GITHUB_WORKSPACE" && rm -rf "$TMPDIR"

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v3
        with:
          files: |
            totp-authenticator-${{ github.ref_name }}.zip
            totp-authenticator-${{ github.ref_name }}.tar.gz
          draft: false
          generate_release_notes: true
